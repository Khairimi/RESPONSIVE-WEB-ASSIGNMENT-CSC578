<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>UiTM Attendance</title>
</head>
<body>
    <h1 id="title">UiTM Student Attendance Form</h1>
    <p id="description">Thank you for taking the time to fill out the attendance form.</p>

    <form id="survey-form">
        <label id="name-label" for="name">Full Name:</label>
        <input type="text" id="name" placeholder="Enter your name" required>

        <br><br>

        <label id="email-label" for="email">Student Email:</label>
        <input type="email" id="email" placeholder="Enter your email" required>

        <br><br>

        <label id="number-label" for="number">Student ID Number (Last 4 digits):</label>
        <input type="number" id="number" min="0001" max="9999" placeholder="1234">

        <br><br>

        <label for="dropdown">Select your Faculty:</label>
        <select id="dropdown">
            <option disabled selected value>Choose faculty...</option>
            <option value="fskm">FSKM (Computer Science)</option>
            <option value="fkm">FKM (Mechanical Engineering)</option>
            <option value="fpa">FPA (Applied Science)</option>
        </select>

        <br><br>

        <p>Are you attending physically or online?</p>
        <label>
            <input type="radio" name="status" value="physical" checked> Physical
        </label>
        <label>
            <input type="radio" name="status" value="online"> Online
        </label>

        <br><br>

        <p>Which tasks have you completed today?</p>
        <label>
            <input type="checkbox" value="quiz"> Quiz
        </label>
        <label>
            <input type="checkbox" value="lab-work"> Lab Work
        </label>
        <label>
            <input type="checkbox" value="presentation"> Presentation
        </label>

        <br><br>

        <p>Any remarks for today's class?</p>
        <textarea id="remarks" placeholder="Enter remarks here..."></textarea>

        <br><br>

        <button type="submit" id="submit">Submit Attendance</button>
    </form>
</body>
</html>
